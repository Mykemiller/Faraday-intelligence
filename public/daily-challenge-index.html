<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faraday Daily Challenge — Test Your Edge</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Serif:wght@400;600;700&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "IBM Plex Serif", serif;
      background-color: #EEE6DA;
      color: #1C3424;
      line-height: 1.6;
    }

    #root {
      width: 100%;
      min-height: 100vh;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background-color: #EEE6DA;
      border-bottom: 1px solid #1C3424;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.875rem;
    }

    nav a {
      color: #1C3424;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    nav a:hover {
      opacity: 0.7;
    }

    .nav-left {
      display: flex;
      gap: 1.5rem;
    }

    .nav-right {
      display: flex;
      gap: 1.5rem;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="/">← Faraday Home</a>
    </div>
    <div class="nav-right">
      <a href="/profile">My Profile</a>
    </div>
  </nav>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    (async function() {
      try {
        const response = await fetch('/faraday-daily-challenge-newicons.jsx');
        let jsxCode = await response.text();

        // Strip import/export statements for Babel Standalone compatibility
        jsxCode = jsxCode
          .replace(/import\s+\{[^}]*\}\s+from\s+['"].*?['"];?/g, '')
          .replace(/import\s+.*?from\s+['"].*?['"];?/g, '')
          .replace(/export\s+default\s+function\s+\w+/g, 'function _App_')
          .replace(/export\s+default\s+/g, 'const _App_ = ')
          .replace(/export\s+const\s+/g, 'const ')
          .replace(/export\s+function\s+/g, 'function ');

        // Add render call
        jsxCode += '\n\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(_App_));';

        // Use Babel.transform() API to compile JSX → JS, then eval
        const { useState, useEffect, useRef, useCallback } = React;
        const compiled = Babel.transform(jsxCode, {
          presets: ['react'],
          filename: 'daily-challenge.jsx'
.replace(/export\s+default\s+function\s+\w+/g, 'function _App_')
        // Execute the compiled code
        const fn = new Function('React', 'ReactDOM', 'useState', 'useEffect', 'useRef', 'useCallback', compiled.code);
        fn(React, ReactDOM, useState, useEffect, useRef, useCallback);
      } catch (error) {
        console.error('Error loading daily challenge:', error);
        document.getElementById('root').innerHTML = '<p style="padding:2rem;font-family:monospace;color:#C4922A;">Error loading daily challenge: ' + error.message + '</p>';
      }
    })();
  </script>
</body>
</html>
